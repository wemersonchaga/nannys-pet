<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nanny's Pets</title>
</head>
<body>

    <div class="login-container">
        
        <div class="paw-print">🐾</div>
        <div class="paw-print">🐾</div>
        <div class="paw-print">🐾</div>
        <div class="paw-print">🐾</div>
        <div class="paw-print">🐾</div>
        <div class="paw-print">🐾</div>

        <div class="login-card">
            <h1> <img src="assets/img/logo.png" alt="Logo Nanny's Pets" /> </h1>
            
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" formControlName="username" placeholder="Digite seu usuário" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" formControlName="password" placeholder="Digite sua senha" required>
                </div>
                
                <button type="submit" [disabled]="loginForm.invalid">Login</button>

                <div *ngIf="errorMessage" class="error-message">
                    {{ errorMessage }}
                </div>

            </form>
        </div>

    </div>

</body>
</html>
